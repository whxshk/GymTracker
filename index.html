<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cutting Gym Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#0B0F19">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Tracker">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0B0F19;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overscroll-behavior-y: none;
            padding-bottom: 8rem;
            min-height: 100vh;
        }

        button { font-family: inherit; }

        /* ── Header ── */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(11,15,25,0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 448px;
            margin: 0 auto;
        }
        .header-left { display: flex; align-items: center; gap: 0.75rem; }
        .day-badge {
            padding: 0.5rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .workout-title {
            font-size: 1.25rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.025em;
            color: #fff;
            text-transform: uppercase;
        }
        .workout-focus {
            font-size: 10px;
            color: #94a3b8;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin-top: 2px;
        }
        .workout-focus svg { color: #60a5fa; }
        .reset-btn {
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.1); }
        .reset-btn:active { transform: scale(0.9); }

        /* ── Progress ── */
        .progress-wrap {
            max-width: 448px;
            margin: 1rem auto 0;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 6px;
            padding: 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .progress-labels span { display: flex; align-items: center; gap: 4px; }
        .progress-track {
            height: 6px;
            background: #1e293b;
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.5s ease-out;
        }

        /* ── Main ── */
        main {
            max-width: 448px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* ── Timer ── */
        .timer-card {
            background: #121826;
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px -5px rgba(59,130,246,0.3);
            position: sticky;
            top: 108px;
            z-index: 20;
            backdrop-filter: blur(12px);
            margin-bottom: 1rem;
        }
        .timer-left { display: flex; align-items: center; gap: 1rem; }
        .timer-circle-wrap {
            position: relative;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .timer-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .timer-clock-icon { position: relative; z-index: 1; color: #60a5fa; }
        .timer-phase {
            font-size: 10px;
            font-weight: 700;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .timer-digits {
            font-size: 1.875rem;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
            letter-spacing: -0.05em;
            color: #fff;
        }
        .timer-skip {
            background: rgba(59,130,246,0.1);
            color: #60a5fa;
            padding: 0.625rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(59,130,246,0.2);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }
        .timer-skip:active { background: rgba(59,130,246,0.2); }

        /* ── Exercise cards ── */
        .exercise-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }

        .ex-card {
            background: #121826;
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .ex-card.all-done {
            border-color: rgba(16,185,129,0.3);
            box-shadow: 0 0 20px -10px rgba(16,185,129,0.2);
        }

        .card-top {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .card-emoji-bg {
            position: absolute;
            right: -1rem;
            top: -1rem;
            font-size: 4.5rem;
            opacity: 0.05;
            pointer-events: none;
            filter: grayscale(1);
            line-height: 1;
        }
        .card-info-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .card-img-wrap { position: relative; flex-shrink: 0; }
        .card-img {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            display: block;
        }
        .card-emoji-badge {
            position: absolute;
            bottom: -0.5rem;
            right: -0.5rem;
            font-size: 1.125rem;
            background: #121826;
            border-radius: 50%;
            padding: 0.25rem;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.2;
        }
        .card-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 0.5rem;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag {
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-stats {
            display: flex;
            align-items: stretch;
            gap: 0;
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.625rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
        }
        .stat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat + .stat { border-left: 1px solid rgba(255,255,255,0.1); }
        .stat-label {
            font-size: 9px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }
        .stat-val {
            font-size: 0.875rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-val svg { flex-shrink: 0; }

        .weight-box {
            margin-top: 0.5rem;
            background: rgba(59,130,246,0.1);
            padding: 0.625rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(59,130,246,0.2);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .weight-label {
            font-size: 9px;
            color: #60a5fa;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 2px;
        }
        .weight-val { font-size: 0.875rem; font-weight: 700; color: #bfdbfe; }

        /* ── Set buttons ── */
        .sets-area {
            padding: 1.25rem;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.1));
        }
        .sets-row { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .set-btn {
            flex: 1;
            min-width: 3rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.125rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .set-btn.pending {
            background: #1C2436;
            color: #64748b;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .set-btn.pending:hover { border-color: rgba(255,255,255,0.2); }
        .set-btn.pending:active { transform: scale(0.95); }
        .set-btn.done {
            background: linear-gradient(135deg, #34d399, #059669);
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(16,185,129,0.2);
            transform: scale(0.98);
        }

        /* ── Tip box ── */
        .tip-box {
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .tip-box.blue {
            background: linear-gradient(to right, rgba(30,58,138,0.2), rgba(88,28,135,0.2));
            border-color: rgba(59,130,246,0.2);
        }
        .tip-box.orange {
            background: linear-gradient(to right, rgba(120,53,15,0.2), rgba(127,29,29,0.2));
            border-color: rgba(249,115,22,0.2);
        }
        .tip-icon {
            padding: 0.5rem;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tip-icon.blue { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .tip-icon.orange { background: rgba(249,115,22,0.2); color: #fb923c; }
        .tip-text { font-size: 0.75rem; font-weight: 500; line-height: 1.625; }
        .tip-text.blue { color: rgba(191,219,254,0.7); }
        .tip-text.orange { color: rgba(254,215,170,0.8); }

        /* ── Bottom nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            background: rgba(18,24,38,0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 0.25rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 40;
            display: flex;
            overflow-x: auto;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .bottom-nav { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            flex: 1;
            padding: 0.75rem 0.25rem;
            border-radius: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            color: #64748b;
            transition: all 0.3s;
            position: relative;
        }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-btn:not(.active):hover { background: rgba(255,255,255,0.05); color: #94a3b8; }
        .nav-icon { font-size: 1.25rem; line-height: 1; margin-bottom: 2px; transition: transform 0.3s; }
        .nav-btn.active .nav-icon { transform: scale(1.25); margin-bottom: 4px; }
        .nav-label { font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
        .nav-indicator {
            position: absolute;
            bottom: 0;
            width: 2rem;
            height: 4px;
            border-radius: 4px 4px 0 0;
        }

        /* ── Day gradient backgrounds ── */
        .g-orange  { background: linear-gradient(135deg, #f97316, #dc2626); }
        .g-blue    { background: linear-gradient(135deg, #3b82f6, #0891b2); }
        .g-green   { background: linear-gradient(135deg, #22c55e, #059669); }
        .g-purple  { background: linear-gradient(135deg, #a855f7, #db2777); }
        .g-indigo  { background: linear-gradient(135deg, #6366f1, #3b82f6); }
        .g-teal    { background: linear-gradient(135deg, #14b8a6, #059669); }
        .g-slate   { background: linear-gradient(135deg, #64748b, #334155); }

        /* ── Animations ── */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
    </style>
</head>

          { day:"Day 6", title:"Legs Volume", icon:"🔋", focus:"Quads, Hams, Glutes", color:"from-teal-500 to-emerald-600",
            exercises:[
              { name:"Leg Extension", emoji:"🦵", tags:["Quads Isolation"], sets:3, reps:"12–15", rest:90, weight:"40–70 kg" },
              { name:"Seated Leg Curl", emoji:"🪝", tags:["Hamstrings"], sets:3, reps:"12–15", rest:90, weight:"35–60 kg" },
              { name:"Hip Thrust", emoji:"🍑", tags:["Glutes"], sets:3, reps:"8–12", rest:180, weight:"70–120 kg" },
              { name:"Adductor Machine", emoji:"🗜️", tags:["Inner Thigh"], sets:2, reps:"12–15", rest:90, weight:"35–65 kg" },
              { name:"Abductor Machine", emoji:"🛸", tags:["Outer Glute"], sets:2, reps:"12–15", rest:90, weight:"35–65 kg" },
              { name:"Seated Calf Raise", emoji:"👟", tags:["Soleus"], sets:3, reps:"12–15", rest:90, weight:"35–70 kg" },
            ]},
          { day:"Day 7", title:"Full Rest", icon:"🧘‍♂️", focus:"Recovery", color:"from-slate-500 to-slate-700", isRest:true,
            exercises:[
              { name:"Walking (Low Intensity)", emoji:"🚶‍♂️", tags:["Active Recovery"], sets:1, reps:"30–60 mins", rest:0, weight:"Bodyweight" },
              { name:"Nutrition Check", emoji:"🥗", tags:["Diet"], sets:1, reps:"Deficit", rest:0, weight:"N/A" },
            ]},
        ];

        /* ── State ── */
        let activeDay = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let completedSets = JSON.parse(localStorage.getItem('gymCompletedSets') || '{}');
        let timeLeft = 0;
        let totalRestTime = 0;
        let timerInterval = null;

        function save() {
            localStorage.setItem('gymCompletedSets', JSON.stringify(completedSets));
        }

        function toggleSet(exIdx, setIdx, rest) {
            const key = `${activeDay}-${exIdx}-${setIdx}`;
            completedSets[key] = !completedSets[key];
            save();
            if (completedSets[key] && rest > 0) startTimer(rest);
            render();
        }

        function resetDay() {
            Object.keys(completedSets).forEach(k => {
                if (k.startsWith(`${activeDay}-`)) delete completedSets[k];
            });
            save();
            stopTimer();
            render();
        }

        function changeDay(idx) { activeDay = idx; render(); }

        function startTimer(secs) {
            stopTimer();
            timeLeft = totalRestTime = secs;
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) { stopTimer(); return; }
                updateTimerDOM();
            }, 1000);
            render();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 0;
        }

        function updateTimerDOM() {
            const digits = document.getElementById('timer-digits');
            if (digits) {
                const m = Math.floor(timeLeft / 60);
                const s = String(timeLeft % 60).padStart(2, '0');
                digits.textContent = `${m}:${s}`;
            }
            const ring = document.getElementById('timer-ring');
            if (ring && totalRestTime > 0) {
                ring.style.strokeDashoffset = 138 - (138 * timeLeft / totalRestTime);
            }
        }

        /* ── Render ── */
        function render() {
            const w = workoutData[activeDay];
            const gradClass = GRAD[w.color] || 'g-slate';
            const totalSets = w.exercises.reduce((a, ex) => a + ex.sets, 0);
            const doneSets = Object.keys(completedSets).filter(k => k.startsWith(`${activeDay}-`) && completedSets[k]).length;
            const pct = totalSets === 0 ? 100 : Math.round(doneSets / totalSets * 100);

            /* Timer */
            let timerHTML = '';
            if (timeLeft > 0) {
                const m = Math.floor(timeLeft / 60);
                const s = String(timeLeft % 60).padStart(2, '0');
                const offset = 138 - (138 * timeLeft / totalRestTime);
                timerHTML = `
                <div class="timer-card">
                    <div class="timer-left">
                        <div class="timer-circle-wrap">
                            <svg class="timer-svg" viewBox="0 0 48 48">
                                <circle cx="24" cy="24" r="22" stroke="#1e293b" stroke-width="3" fill="none"/>
                                <circle id="timer-ring" cx="24" cy="24" r="22" stroke="#3b82f6" stroke-width="3" fill="none"
                                    stroke-dasharray="138" stroke-dashoffset="${offset}"
                                    style="transition:stroke-dashoffset 1s linear;"/>
                            </svg>
                            <span class="timer-clock-icon pulse">${IC.clock}</span>
                        </div>
                        <div>
                            <p class="timer-phase">Recovery Phase</p>
                            <p class="timer-digits" id="timer-digits">${m}:${s}</p>
                        </div>
                    </div>
                    <button class="timer-skip" onclick="stopTimer();render()">Skip</button>
                </div>`;
            }

            /* Exercises */
            const exercisesHTML = w.exercises.map((ex, exIdx) => {
                const allDone = ex.sets > 0 && [...Array(ex.sets)].every((_, i) => completedSets[`${activeDay}-${exIdx}-${i}`]);
                const tags = ex.tags.map(t => `<span class="tag">${t}</span>`).join('');
                const sets = [...Array(ex.sets)].map((_, si) => {
                    const done = completedSets[`${activeDay}-${exIdx}-${si}`];
                    return `<button class="set-btn ${done ? 'done' : 'pending'}" onclick="toggleSet(${exIdx},${si},${ex.rest})">
                        ${done ? IC.check : si + 1}
                    </button>`;
                }).join('');

                return `
                <div class="ex-card ${allDone ? 'all-done' : ''}">
                    <div class="card-top">
                        <div class="card-emoji-bg">${ex.emoji}</div>
                        <div class="card-info-row">
                            <div class="card-img-wrap">
                                <img class="card-img" src="https://picsum.photos/seed/${ex.name.replace(/\s/g,'')}/150/150?grayscale" alt="${ex.name}" onerror="this.style.display='none'">
                                <span class="card-emoji-badge">${ex.emoji}</span>
                            </div>
                            <div>
                                <div class="card-name">${ex.name}</div>
                                <div class="tags">${tags}</div>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="stat">
                                <span class="stat-label">Target</span>
                                <span class="stat-val" style="color:#fff">${IC.flame.replace('stroke="currentColor"','stroke="#f97316"')} ${ex.reps}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Volume</span>
                                <span class="stat-val" style="color:#fff">${IC.dumbbell.replace('stroke="currentColor"','stroke="#60a5fa"')} ${ex.sets} Sets</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Rest</span>
                                <span class="stat-val" style="color:#fff">${IC.clockSm.replace('stroke="currentColor"','stroke="#34d399"')} ${ex.rest}s</span>
                            </div>
                        </div>
                        <div class="weight-box">
                            <span class="weight-label">Starting Weight</span>
                            <span class="weight-val">${ex.weight}</span>
                        </div>
                    </div>
                    <div class="sets-area">
                        <div class="sets-row">${sets}</div>
                    </div>
                </div>`;
            }).join('');

            /* Nav */
            const navHTML = workoutData.map((d, i) => {
                const active = i === activeDay;
                const gc = GRAD[d.color] || 'g-slate';
                return `<button class="nav-btn ${active ? 'active' : ''}" onclick="changeDay(${i})">
                    <span class="nav-icon">${d.icon}</span>
                    <span class="nav-label">D${i + 1}</span>
                    ${active ? `<span class="nav-indicator ${gc}"></span>` : ''}
                </button>`;
            }).join('');

            /* Tip */
            const tipType = w.note ? 'orange' : 'blue';
            const tipText = w.note || 'Stay 1-3 reps from failure on big lifts. Focus on control, not ego.';

            const html = `
            <header class="app-header">
                <div class="header-row">
                    <div class="header-left">
                        <div class="day-badge ${gradClass}">${w.icon}</div>
                        <div>
                            <div class="workout-title">${w.title}</div>
                            <div class="workout-focus">${IC.target.replace('stroke="currentColor"','stroke="#60a5fa"')} ${w.focus}</div>
                        </div>
                    </div>
                    <button class="reset-btn" onclick="resetDay()">${IC.reset}</button>
                </div>
                <div class="progress-wrap">
                    <div class="progress-labels">
                        <span>${IC.activity} Progress</span>
                        <span>${doneSets} / ${totalSets} Sets</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill ${gradClass}" style="width:${pct}%"></div>
                    </div>
                </div>
            </header>

            <main>
                ${timerHTML}
                <div class="exercise-list">${exercisesHTML}</div>
                <div class="tip-box ${tipType}">
                    <div class="tip-icon ${tipType}">${IC.info}</div>
                    <p class="tip-text ${tipType}">${tipText}</p>
                </div>
            </main>

            <nav class="bottom-nav">${navHTML}</nav>`;

            const scrollY = window.scrollY;
            document.getElementById('app').innerHTML = html;
            window.scrollTo(0, scrollY);
        }

        window.onload = render;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
    </script>
</body>
</html>
