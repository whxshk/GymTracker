<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cutting Gym Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#0B0F19">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Tracker">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0B0F19;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overscroll-behavior-y: none;
            padding-bottom: 8rem;
            min-height: 100vh;
        }

        button { font-family: inherit; }

        /* ── Header ── */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(11,15,25,0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 448px;
            margin: 0 auto;
        }
        .header-left { display: flex; align-items: center; gap: 0.75rem; }
        .day-badge {
            padding: 0.5rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .workout-title {
            font-size: 1.25rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.025em;
            color: #fff;
            text-transform: uppercase;
        }
        .workout-focus {
            font-size: 10px;
            color: #94a3b8;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin-top: 2px;
        }
        .workout-focus svg { color: #60a5fa; }
        .reset-btn {
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.1); }
        .reset-btn:active { transform: scale(0.9); }

        /* ── Progress ── */
        .progress-wrap {
            max-width: 448px;
            margin: 1rem auto 0;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 6px;
            padding: 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .progress-labels span { display: flex; align-items: center; gap: 4px; }
        .progress-track {
            height: 6px;
            background: #1e293b;
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.5s ease-out;
        }

        /* ── Main ── */
        main {
            max-width: 448px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* ── Timer ── */
        .timer-card {
            background: #121826;
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px -5px rgba(59,130,246,0.3);
            position: sticky;
            top: 108px;
            z-index: 20;
            backdrop-filter: blur(12px);
            margin-bottom: 1rem;
        }
        .timer-left { display: flex; align-items: center; gap: 1rem; }
        .timer-circle-wrap {
            position: relative;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .timer-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .timer-clock-icon { position: relative; z-index: 1; color: #60a5fa; }
        .timer-phase {
            font-size: 10px;
            font-weight: 700;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .timer-digits {
            font-size: 1.875rem;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
            letter-spacing: -0.05em;
            color: #fff;
        }
        .timer-skip {
            background: rgba(59,130,246,0.1);
            color: #60a5fa;
            padding: 0.625rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(59,130,246,0.2);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }
        .timer-skip:active { background: rgba(59,130,246,0.2); }

        /* ── Exercise cards ── */
        .exercise-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }

        .ex-card {
            background: #121826;
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .ex-card.all-done {
            border-color: rgba(16,185,129,0.3);
            box-shadow: 0 0 20px -10px rgba(16,185,129,0.2);
        }

        .card-top {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .card-emoji-bg {
            position: absolute;
            right: -1rem;
            top: -1rem;
            font-size: 4.5rem;
            opacity: 0.05;
            pointer-events: none;
            filter: grayscale(1);
            line-height: 1;
        }
        .card-info-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .card-img-wrap { position: relative; flex-shrink: 0; }
        .card-img {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            display: block;
        }
        .card-emoji-badge {
            position: absolute;
            bottom: -0.5rem;
            right: -0.5rem;
            font-size: 1.125rem;
            background: #121826;
            border-radius: 50%;
            padding: 0.25rem;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.2;
        }
        .card-name {
            font-size: 1.125rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 0.5rem;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag {
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-stats {
            display: flex;
            align-items: stretch;
            gap: 0;
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.625rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
        }
        .stat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat + .stat { border-left: 1px solid rgba(255,255,255,0.1); }
        .stat-label {
            font-size: 9px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }
        .stat-val {
            font-size: 0.875rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-val svg { flex-shrink: 0; }

        .weight-box {
            margin-top: 0.5rem;
            background: rgba(59,130,246,0.1);
            padding: 0.625rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(59,130,246,0.2);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .weight-label {
            font-size: 9px;
            color: #60a5fa;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 2px;
        }
        .weight-val { font-size: 0.875rem; font-weight: 700; color: #bfdbfe; }

        /* ── Set buttons ── */
        .sets-area {
            padding: 1.25rem;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.1));
        }
        .sets-row { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .set-btn {
            flex: 1;
            min-width: 3rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.125rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .set-btn.pending {
            background: #1C2436;
            color: #64748b;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .set-btn.pending:hover { border-color: rgba(255,255,255,0.2); }
        .set-btn.pending:active { transform: scale(0.95); }
        .set-btn.done {
            background: linear-gradient(135deg, #34d399, #059669);
            color: #fff;
            box-shadow: 0 10px 15px -3px rgba(16,185,129,0.2);
            transform: scale(0.98);
        }

        /* ── Tip box ── */
        .tip-box {
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .tip-box.blue {
            background: linear-gradient(to right, rgba(30,58,138,0.2), rgba(88,28,135,0.2));
            border-color: rgba(59,130,246,0.2);
        }
        .tip-box.orange {
            background: linear-gradient(to right, rgba(120,53,15,0.2), rgba(127,29,29,0.2));
            border-color: rgba(249,115,22,0.2);
        }
        .tip-icon {
            padding: 0.5rem;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tip-icon.blue { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .tip-icon.orange { background: rgba(249,115,22,0.2); color: #fb923c; }
        .tip-text { font-size: 0.75rem; font-weight: 500; line-height: 1.625; }
        .tip-text.blue { color: rgba(191,219,254,0.7); }
        .tip-text.orange { color: rgba(254,215,170,0.8); }

        /* ── Bottom nav ── */
        .bottom-nav {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            background: rgba(18,24,38,0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 0.25rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 40;
            display: flex;
            overflow-x: auto;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .bottom-nav { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            flex: 1;
            padding: 0.75rem 0.25rem;
            border-radius: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            color: #64748b;
            transition: all 0.3s;
            position: relative;
        }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-btn:not(.active):hover { background: rgba(255,255,255,0.05); color: #94a3b8; }
        .nav-icon { font-size: 1.25rem; line-height: 1; margin-bottom: 2px; transition: transform 0.3s; }
        .nav-btn.active .nav-icon { transform: scale(1.25); margin-bottom: 4px; }
        .nav-label { font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
        .nav-indicator {
            position: absolute;
            bottom: 0;
            width: 2rem;
            height: 4px;
            border-radius: 4px 4px 0 0;
        }

        /* ── Day gradient backgrounds ── */
        .g-orange  { background: linear-gradient(135deg, #f97316, #dc2626); }
        .g-blue    { background: linear-gradient(135deg, #3b82f6, #0891b2); }
        .g-green   { background: linear-gradient(135deg, #22c55e, #059669); }
        .g-purple  { background: linear-gradient(135deg, #a855f7, #db2777); }
        .g-indigo  { background: linear-gradient(135deg, #6366f1, #3b82f6); }
        .g-teal    { background: linear-gradient(135deg, #14b8a6, #059669); }
        .g-slate   { background: linear-gradient(135deg, #64748b, #334155); }

        /* ── Animations ── */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }

        /* ── Desktop centering ── */
        @media (min-width: 500px) {
            body {
                background: #060910;
            }
            body::before {
                content: '';
                position: fixed;
                top: 0; bottom: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 460px;
                background: #0B0F19;
                border-left: 1px solid rgba(255,255,255,0.05);
                border-right: 1px solid rgba(255,255,255,0.05);
                z-index: 0;
                pointer-events: none;
            }
            .app-header, main, #app { position: relative; z-index: 1; }
            .bottom-nav {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: 444px;
            }
        }

        /* ── Profile Button ── */
        @keyframes profilePulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.5), 0 8px 32px -6px rgba(99,102,241,0.5); }
            50%      { box-shadow: 0 0 0 6px rgba(99,102,241,0),  0 8px 32px -6px rgba(99,102,241,0.6); }
        }
        .profile-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.625rem;
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 1rem;
            color: #fff;
            font-size: 1rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.12em;
            cursor: pointer; transition: all 0.2s;
            margin-top: 1rem; font-family: inherit;
            animation: profilePulse 2.8s ease-in-out infinite;
        }
        .profile-btn:hover {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px -6px rgba(99,102,241,0.6);
            animation: none;
        }
        .profile-btn:active { transform: scale(0.97); box-shadow: none; animation: none; }
        .profile-btn-icon { font-size: 1.25rem; line-height: 1; }

        /* ── Calendar Overlay ── */
        .cal-overlay {
            position: fixed; inset: 0;
            background: rgba(6,9,16,0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 50; overflow-y: auto;
            padding: 1rem; padding-bottom: 7rem;
        }
        .cal-panel {
            max-width: 448px; margin: 0 auto;
            background: #0f1623;
            border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.07);
            overflow: hidden; box-shadow: 0 30px 70px -15px rgba(0,0,0,0.9);
        }
        .cal-top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }
        .cal-panel-title { font-size: 1.125rem; font-weight: 900; color: #fff; font-style: italic; text-transform: uppercase; letter-spacing: -0.02em; }
        .cal-panel-sub   { font-size: 10px; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }
        .cal-close {
            width: 2rem; height: 2rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%; color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.875rem; font-weight: 700; transition: all 0.2s;
            flex-shrink: 0; font-family: inherit;
        }
        .cal-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.2); }

        /* Analytics */
        .analytics-bar {
            display: grid; grid-template-columns: repeat(4,1fr);
            background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .analytics-stat { padding: 1rem 0.5rem; text-align: center; border-right: 1px solid rgba(255,255,255,0.05); }
        .analytics-stat:last-child { border-right: none; }
        .analytics-val { font-size: 1.375rem; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 5px; font-family: monospace; letter-spacing: -0.04em; }
        .analytics-lbl { font-size: 8px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; }
        .av-green { color: #34d399; } .av-blue { color: #60a5fa; } .av-amber { color: #fb923c; } .av-red { color: #f87171; }

        /* Month Nav */
        .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem 0.625rem; }
        .month-label { font-size: 0.875rem; font-weight: 800; color: #e2e8f0; }
        .month-arrow {
            width: 2rem; height: 2rem;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 0.5rem; color: #94a3b8; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 1.125rem; font-weight: 700; font-family: inherit;
        }
        .month-arrow:hover:not([disabled]) { background: rgba(255,255,255,0.1); color: #fff; }
        .month-arrow[disabled] { opacity: 0.25; cursor: default; }

        /* Grid */
        .cal-grid-wrap { padding: 0 1rem 0.75rem; }
        .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 4px; }
        .cal-weekday { text-align: center; font-size: 9px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
        .cal-cell {
            aspect-ratio: 1; border-radius: 0.5rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; cursor: pointer;
            border: 1px solid transparent; transition: all 0.15s;
            gap: 1px; line-height: 1; user-select: none;
        }
        .cal-cell.empty   { visibility: hidden; pointer-events: none; }
        .cal-cell.future  { color: #1e293b; pointer-events: none; }
        .cal-cell.completed { background: rgba(16,185,129,0.1);  border-color: rgba(16,185,129,0.2);  color: #34d399; }
        .cal-cell.completed:hover { background: rgba(16,185,129,0.18); border-color: rgba(16,185,129,0.35); }
        .cal-cell.skipped   { background: rgba(239,68,68,0.08);   border-color: rgba(239,68,68,0.18);   color: #f87171; }
        .cal-cell.skipped:hover { background: rgba(239,68,68,0.15); }
        .cal-cell.rest      { background: rgba(100,116,139,0.08); border-color: rgba(100,116,139,0.15); color: #64748b; }
        .cal-cell.rest:hover { background: rgba(100,116,139,0.15); }
        .cal-cell.nodata    { color: #334155; background: rgba(255,255,255,0.015); }
        .cal-cell.nodata:hover { background: rgba(255,255,255,0.04); color: #475569; }
        .cal-cell.today { background: rgba(99,102,241,0.3) !important; border-color: #6366f1 !important; color: #c4b5fd !important; font-weight: 900; }
        .cal-cell.selected { box-shadow: 0 0 0 2.5px #fff !important; }
        .cal-cell-icon { font-size: 0.55rem; line-height: 1; }
        .cal-cell.nodata .cal-cell-icon { color: #2d3a4a; font-size: 0.6rem; }
        .detail-pip { cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
        .detail-pip:hover { opacity: 0.7; transform: scale(0.88); }
        /* Status Dropdown */
        .status-dropdown-wrap { position: relative; flex-shrink: 0; }
        .status-dropdown {
            position: absolute; right: 0; top: calc(100% + 6px);
            background: #1a2436; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem; overflow: hidden; z-index: 200;
            min-width: 158px; box-shadow: 0 12px 32px -5px rgba(0,0,0,0.75);
        }
        .status-opt {
            display: flex; align-items: center; gap: 0.625rem;
            padding: 0.625rem 1rem; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; transition: background 0.15s; color: #e2e8f0;
            font-family: inherit; border: none; background: none; width: 100%; text-align: left;
        }

        .cal-legend { display: flex; justify-content: center; gap: 1.25rem; padding: 0.625rem 1rem 1rem; border-top: 1px solid rgba(255,255,255,0.04); }

        .legend-swatch.skipped   { background: rgba(239,68,68,0.15);  border-color: rgba(239,68,68,0.35); }

        /* Detail Sheet */

        .detail-workout-name { font-size: 10px; color: #475569; font-weight: 600; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
        .detail-badge { padding: 3px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
        .detail-badge.completed { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .detail-badge.skipped   { background: rgba(239,68,68,0.1);    color: #f87171; border: 1px solid rgba(239,68,68,0.18); }
        .detail-badge.rest      { background: rgba(100,116,139,0.1);  color: #94a3b8; border: 1px solid rgba(100,116,139,0.18); }
        .detail-ex-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .detail-ex-row:last-child { border-bottom: none; }
        .detail-ex-name { font-size: 0.8rem; font-weight: 600; color: #cbd5e1; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .detail-ex-sets { display: flex; gap: 3px; flex-shrink: 0; }
        .detail-pip { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; }
        .detail-pip.done { background: rgba(16,185,129,0.18); color: #34d399; }
        .detail-pip.miss { background: rgba(255,255,255,0.04); color: #334155; }

<body>
    <div id="app"></div>
    <script>
        /* ── Inline SVG icons ── */
        const IC = {

        };

        /* ── Day gradient class map ── */
        const GRAD = {
            'from-orange-500 to-red-600':   'g-orange',
            'from-blue-500 to-cyan-600':    'g-blue',
            'from-green-500 to-emerald-600':'g-green',
            'from-purple-500 to-pink-600':  'g-purple',
            'from-indigo-500 to-blue-600':  'g-indigo',
            'from-teal-500 to-emerald-600': 'g-teal',
            'from-slate-500 to-slate-700':  'g-slate',
        };

        /* ── Workout data ── */
        const workoutData = [
          { day:"Day 1", title:"Push Heavy", icon:"🦍", focus:"Chest, Shoulders, Triceps", color:"from-orange-500 to-red-600",
            exercises:[
              { name:"Incline Chest Press", emoji:"💥", tags:["Upper Chest","Compound"], sets:3, reps:"6–10", rest:120, weight:"35–55 kg" },
              { name:"Flat Chest Press", emoji:"🧱", tags:["Mid Chest","Compound"], sets:3, reps:"8–12", rest:120, weight:"40–65 kg" },

              { name:"Cable Lateral Raise", emoji:"🦅", tags:["Side Delts"], sets:3, reps:"12–15", rest:60, weight:"5–10 kg per arm" },

          { day:"Day 2", title:"Pull Heavy", icon:"🦏", focus:"Back, Biceps, Rear Delts", color:"from-blue-500 to-cyan-600",
            exercises:[

              { name:"Seated Cable Row", emoji:"🚣", tags:["Mid Back","Thickness"], sets:3, reps:"8–12", rest:120, weight:"45–70 kg" },
              { name:"Rear Delt Fly", emoji:"🎯", tags:["Rear Delts"], sets:2, reps:"12–15", rest:90, weight:"25–45 kg" },

              { name:"Hammer Curl", emoji:"🔨", tags:["Brachialis"], sets:2, reps:"10–12", rest:60, weight:"10–16 kg dumbbells" },
            ]},
          { day:"Day 3", title:"Legs Heavy", icon:"🦖", focus:"Quads, Hams, Calves", color:"from-green-500 to-emerald-600",
            note:"Be careful. At 123 kg, your knees and lower back handle a lot. Full range, controlled reps, no ego lifting.",
            exercises:[
              { name:"Hack Squat", emoji:"🏗️", tags:["Quads","Compound"], sets:3, reps:"6–10", rest:120, weight:"40–80 kg added" },
              { name:"Leg Press", emoji:"🚂", tags:["Overall Leg"], sets:2, reps:"8–12", rest:120, weight:"120–200 kg" },
              { name:"Romanian Deadlift", emoji:"🏋️", tags:["Hamstrings","Glutes"], sets:3, reps:"8–10", rest:120, weight:"50–80 kg barbell / 20–32 kg DBs" },
              { name:"Seated Leg Curl", emoji:"🪝", tags:["Hamstrings"], sets:2, reps:"10–12", rest:90, weight:"35–60 kg" },
              { name:"Standing Calf Raise", emoji:"🦵", tags:["Calves"], sets:3, reps:"12–15", rest:90, weight:"60–100 kg" },
            ]},
          { day:"Day 4", title:"Push Volume", icon:"⚡", focus:"Chest, Shoulders, Triceps", color:"from-purple-500 to-pink-600",
            exercises:[
              { name:"Pec Deck", emoji:"🦋", tags:["Chest Isolation"], sets:3, reps:"12–15", rest:90, weight:"35–60 kg" },
              { name:"Incline Cable Fly", emoji:"🪁", tags:["Upper Chest","Isolation"], sets:2, reps:"12–15", rest:60, weight:"10–20 kg per arm" },
              { name:"Push-ups", emoji:"🔥", tags:["Burnout"], sets:2, reps:"1–2 RIR", rest:90, weight:"Bodyweight (or Incline)" },
              { name:"Dumbbell Lateral Raise", emoji:"🦅", tags:["Side Delts"], sets:3, reps:"12–15", rest:60, weight:"6–10 kg DBs" },
              { name:"Cable Lateral Raise", emoji:"🎯", tags:["Side Delts"], sets:1, reps:"15", rest:60, weight:"5–10 kg per arm" },
              { name:"Triceps Rope Pushdown", emoji:"🐴", tags:["Triceps"], sets:3, reps:"10–15", rest:60, weight:"25–45 kg" },
            ]},
          { day:"Day 5", title:"Pull Volume", icon:"🌊", focus:"Back, Biceps, Rear Delts", color:"from-indigo-500 to-blue-600",
            exercises:[
              { name:"Chest-Supported Row", emoji:"🛡️", tags:["Mid Back"], sets:3, reps:"8–12", rest:120, weight:"45–75 kg" },
              { name:"Straight-Arm Pulldown", emoji:"⛷️", tags:["Lats Isolation"], sets:3, reps:"12–15", rest:90, weight:"20–35 kg" },
              { name:"Face Pull", emoji:"👹", tags:["Upper Back","Health"], sets:3, reps:"12–15", rest:60, weight:"15–30 kg" },
              { name:"Dumbbell Curl", emoji:"💪", tags:["Biceps"], sets:2, reps:"10–12", rest:60, weight:"10–16 kg DBs" },
              { name:"Cable Curl", emoji:"⛓️", tags:["Constant Tension"], sets:2, reps:"10–12", rest:60, weight:"20–35 kg" },
            ]},
          { day:"Day 6", title:"Legs Volume", icon:"🔋", focus:"Quads, Hams, Glutes", color:"from-teal-500 to-emerald-600",
            exercises:[
              { name:"Leg Extension", emoji:"🦵", tags:["Quads Isolation"], sets:3, reps:"12–15", rest:90, weight:"40–70 kg" },
              { name:"Seated Leg Curl", emoji:"🪝", tags:["Hamstrings"], sets:3, reps:"12–15", rest:90, weight:"35–60 kg" },
              { name:"Hip Thrust", emoji:"🍑", tags:["Glutes"], sets:3, reps:"8–12", rest:90, weight:"70–120 kg" },
              { name:"Adductor Machine", emoji:"🗜️", tags:["Inner Thigh"], sets:2, reps:"12–15", rest:90, weight:"35–65 kg" },
              { name:"Abductor Machine", emoji:"🛸", tags:["Outer Glute"], sets:2, reps:"12–15", rest:90, weight:"35–65 kg" },
              { name:"Seated Calf Raise", emoji:"👟", tags:["Soleus"], sets:3, reps:"12–15", rest:90, weight:"35–70 kg" },
            ]},
          { day:"Day 7", title:"Full Rest", icon:"🧘‍♂️", focus:"Recovery", color:"from-slate-500 to-slate-700", isRest:true,
            exercises:[
              { name:"Walking (Low Intensity)", emoji:"🚶‍♂️", tags:["Active Recovery"], sets:1, reps:"30–60 mins", rest:0, weight:"Bodyweight" },
              { name:"Nutrition Check", emoji:"🥗", tags:["Diet"], sets:1, reps:"Deficit", rest:0, weight:"N/A" },
            ]},
        ];

        /* ── State ── */
        let activeDay = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let completedSets = JSON.parse(localStorage.getItem('gymCompletedSets') || '{}');
        let timeLeft = 0;
        let totalRestTime = 0;
        let timerInterval = null;

        /* ── Profile Calendar State ── */
        let showProfileCalendar = false;
        let calendarViewDate = new Date();
        let selectedCalendarDate = null;
        let statusDropdownKey    = null;

        /* ── History helpers ── */
        function dateKey(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function getHistory() {
            return JSON.parse(localStorage.getItem('gymHistory') || '{}');
        }
        function saveHistoryEntry() {
            const key = dateKey(new Date());
            const w = workoutData[activeDay];
            const total = w.exercises.reduce((a, ex) => a + ex.sets, 0);
            const done  = Object.keys(completedSets).filter(k => k.startsWith(`${activeDay}-`) && completedSets[k]).length;
            const status = w.isRest ? 'rest' : (done > 0 ? 'completed' : null);
            if (!status) return;
            const details = w.exercises.map((ex, ei) => ({
                name: ex.name, emoji: ex.emoji, sets: ex.sets, weight: ex.weight,
                doneSets: [...Array(ex.sets)].filter((_, si) => completedSets[`${activeDay}-${ei}-${si}`]).length
            }));
            const hist = getHistory();
            hist[key] = { status, completedSets: done, totalSets: total, workoutDay: activeDay, workoutTitle: w.title, workoutDetails: details };
            localStorage.setItem('gymHistory', JSON.stringify(hist));
        }
        function seedDemoHistory() {
            if (localStorage.getItem('gymHistorySeeded')) return;
            const hist = getHistory();
            const today = new Date();
            const pattern = ['completed','rest','completed','completed','skipped','completed','rest',
                             'completed','completed','rest','skipped','completed','completed','completed'];
            for (let i = pattern.length; i >= 1; i--) {
                const d = new Date(today); d.setDate(d.getDate() - i);
                const k = dateKey(d);
                const wIdx = (d.getDay() + 6) % 7;
                const w = workoutData[wIdx];
                const rawSt = pattern[pattern.length - i];
                const status = w.isRest ? 'rest' : rawSt;
                const total  = w.exercises.reduce((a, e) => a + e.sets, 0);
                const done   = status === 'completed' ? total : 0;
                hist[k] = {
                    status, completedSets: done, totalSets: total,
                    workoutDay: wIdx, workoutTitle: w.title,
                    workoutDetails: w.exercises.map(ex => ({
                        name: ex.name, emoji: ex.emoji, sets: ex.sets, weight: ex.weight,
                        doneSets: status === 'completed' ? ex.sets : 0
                    }))
                };
            }
            localStorage.setItem('gymHistory', JSON.stringify(hist));
            localStorage.setItem('gymHistorySeeded', '1');
        }
        function calcMonthStats(year, month) {
            const hist  = getHistory();
            const today = new Date();
            let completed = 0, skipped = 0, rest = 0;
            const days = new Date(year, month + 1, 0).getDate();
            for (let d = 1; d <= days; d++) {
                const dt = new Date(year, month, d);
                if (dt > today) break;
                const e = hist[`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`];
                if (!e) continue;
                if (e.status === 'completed') completed++;
                else if (e.status === 'skipped') skipped++;
                else if (e.status === 'rest')    rest++;
            }
            const consistency = (completed + skipped) > 0 ? Math.round(completed / (completed + skipped) * 100) : 0;
            let streak = 0;
            const chk = new Date();
            const todayE = hist[dateKey(chk)];
            if (!todayE || (todayE.status !== 'completed' && todayE.status !== 'rest')) {
                chk.setDate(chk.getDate() - 1); // today not logged yet — count back from yesterday
            }
            for (let i = 0; i < 365; i++) {
                const e = hist[dateKey(chk)];
                if (!e || (e.status !== 'completed' && e.status !== 'rest')) break;
                streak++; chk.setDate(chk.getDate() - 1);
            }
            return { completed, skipped, rest, consistency, streak };
        }

        /* ── Calendar interaction ── */
        function toggleProfileCalendar() { showProfileCalendar = !showProfileCalendar; render(); }
        function closeProfileCalendar()  { showProfileCalendar = false; selectedCalendarDate = null; render(); }
        function navCalendar(dir) {
            calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() + dir, 1);
            render();
        }
        function selectCalDate(key) {
            selectedCalendarDate = selectedCalendarDate === key ? null : key;
            statusDropdownKey = null;
            render();
        }
        function openStatusDropdown(k, e) {
            e.stopPropagation();
            statusDropdownKey = statusDropdownKey === k ? null : k;
            render();
        }
        function setHistoryStatus(k, newStatus, e) {
            e.stopPropagation();
            const hist = getHistory();
            if (!hist[k]) return;
            hist[k].status = newStatus;
            if (newStatus === 'skipped') {
                hist[k].completedSets = 0;
                (hist[k].workoutDetails || []).forEach(ex => { ex.doneSets = 0; ex.doneSetsArr = Array(ex.sets).fill(false); });
            }
            localStorage.setItem('gymHistory', JSON.stringify(hist));
            statusDropdownKey = null;
            render();
        }
        function toggleHistorySet(k, exIdx, setIdx) {
            const hist = getHistory();
            if (!hist[k] || !hist[k].workoutDetails) return;
            const ex = hist[k].workoutDetails[exIdx];
            if (!ex) return;
            if (!ex.doneSetsArr) ex.doneSetsArr = [...Array(ex.sets)].map((_, i) => i < (ex.doneSets || 0));
            ex.doneSetsArr[setIdx] = !ex.doneSetsArr[setIdx];
            ex.doneSets = ex.doneSetsArr.filter(Boolean).length;
            const totalDone = hist[k].workoutDetails.reduce((a, d) => a + (d.doneSets || 0), 0);
            hist[k].completedSets = totalDone;
            if (hist[k].status !== 'rest') hist[k].status = totalDone > 0 ? 'completed' : 'skipped';
            localStorage.setItem('gymHistory', JSON.stringify(hist));
            render();
        }

        /* ── Calendar renderer ── */
        function renderProfileCalendar() {
            const hist  = getHistory();
            const today = new Date();
            const year  = calendarViewDate.getFullYear();
            const month = calendarViewDate.getMonth();
            const stats = calcMonthStats(year, month);
            const todayK = dateKey(today);
            const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();
            const oldestAllowed  = new Date(today.getFullYear() - 1, today.getMonth(), 1);
            const isPrevDisabled = new Date(year, month, 1) <= oldestAllowed;
            const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const WEEKDAYS = ['M','T','W','T','F','S','S'];
            const firstDow = new Date(year, month, 1).getDay();
            const startOff = firstDow === 0 ? 6 : firstDow - 1;
            const daysInMo = new Date(year, month + 1, 0).getDate();

            let cells = '';
            for (let i = 0; i < startOff; i++) cells += `<div class="cal-cell empty"></div>`;
            for (let d = 1; d <= daysInMo; d++) {
                const k   = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dt  = new Date(year, month, d);
                const fut = dt > today;
                const isT = k === todayK;
                const ent = hist[k];
                const st  = ent ? ent.status : null;
                let cls   = 'cal-cell';
                let icon  = '';
                if (fut) {
                    cls += ' future';
                } else if (st === 'completed') { cls += ' completed'; icon = `<span class="cal-cell-icon">✓</span>`; }
                  else if (st === 'skipped')   { cls += ' skipped';   icon = `<span class="cal-cell-icon">✕</span>`; }
                  else if (st === 'rest')       { cls += ' rest';      icon = `<span class="cal-cell-icon">💤</span>`; }
                  else                          { cls += ' nodata';    icon = `<span class="cal-cell-icon">—</span>`; }
                if (isT) cls += ' today';
                if (selectedCalendarDate === k) cls += ' selected';
                const fn = fut ? '' : `onclick="selectCalDate('${k}')"`;
                cells += `<div class="${cls}" ${fn}><span>${d}</span>${icon}</div>`;
            }

            let detailHTML = '';
            if (selectedCalendarDate && hist[selectedCalendarDate]) {
                const ent = hist[selectedCalendarDate];
                const [y2, m2, d2] = selectedCalendarDate.split('-').map(Number);
                const dStr = new Date(y2, m2-1, d2).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
                let exRows = '';
                if (ent.status === 'rest') {
                    exRows = `<div class="detail-ex-row"><span class="detail-ex-name" style="color:#64748b">💤 Rest day — active recovery only</span></div>`;
                } else {
                    exRows = (ent.workoutDetails || []).map((ex, ei) => {
                        const arr = ex.doneSetsArr || [...Array(ex.sets)].map((_, i) => i < (ex.doneSets||0));
                        const pips = arr.map((done, si) =>
                            `<span class="detail-pip ${done?'done':'miss'}" onclick="toggleHistorySet('${selectedCalendarDate}',${ei},${si})">${done?'✓':'·'}</span>`
                        ).join('');
                        return `<div class="detail-ex-row">
                            <span class="detail-ex-name">${ex.emoji} ${ex.name}</span>
                            <div class="detail-ex-sets">${pips}</div>
                            <span class="detail-ex-weight">${ex.weight}</span>
                        </div>`;
                    }).join('');
                }
                detailHTML = `
                <div class="detail-sheet">
                    <div class="detail-header">
                        <div>
                            <div class="detail-date-str">${dStr}</div>
                            <div class="detail-workout-name">${ent.workoutTitle || 'Workout'}</div>
                        </div>
                        <div class="status-dropdown-wrap">
                            <button class="detail-badge ${ent.status}" onclick="openStatusDropdown('${selectedCalendarDate}',event)">
                                ${ent.status} ▾
                            </button>
                            ${statusDropdownKey === selectedCalendarDate ? `
                            <div class="status-dropdown" onclick="event.stopPropagation()">
                                <button class="status-opt" onclick="setHistoryStatus('${selectedCalendarDate}','completed',event)"><span style="color:#34d399">✓</span> Completed</button>
                                <button class="status-opt" onclick="setHistoryStatus('${selectedCalendarDate}','skipped',event)"><span style="color:#f87171">✕</span> Skipped</button>
                                <button class="status-opt" onclick="setHistoryStatus('${selectedCalendarDate}','rest',event)"><span>💤</span> Rest Day</button>
                            </div>` : ''}
                        </div>
                    </div>
                    ${exRows}
                    ${ent.status !== 'rest' ? `<div class="detail-footer">
                        <span class="detail-footer-lbl">Sets Completed</span>
                        <span class="detail-footer-val">${ent.completedSets} / ${ent.totalSets}</span>
                    </div>` : ''}
                </div>`;
            }

            return `
            <div class="cal-overlay" onclick="if(event.target===this)closeProfileCalendar()">
                <div class="cal-panel">
                    <div class="cal-top-bar">
                        <div>
                            <div class="cal-panel-title">📊 Workout History</div>
                            <div class="cal-panel-sub">Tap any date to inspect</div>
                        </div>
                        <button class="cal-close" onclick="closeProfileCalendar()">✕</button>
                    </div>
                    <div class="analytics-bar">
                        <div class="analytics-stat"><div class="analytics-val av-green">${stats.completed}</div><div class="analytics-lbl">Done</div></div>
                        <div class="analytics-stat"><div class="analytics-val av-blue">${stats.consistency}%</div><div class="analytics-lbl">Consistency</div></div>
                        <div class="analytics-stat"><div class="analytics-val av-amber">${stats.streak}</div><div class="analytics-lbl">🔥 Streak</div></div>
                        <div class="analytics-stat"><div class="analytics-val av-red">${stats.skipped}</div><div class="analytics-lbl">Skipped</div></div>
                    </div>
                    <div class="month-nav">
                        <button class="month-arrow" onclick="navCalendar(-1)" ${isPrevDisabled ? 'disabled' : ''}>&#8249;</button>
                        <span class="month-label">${MONTHS[month]} ${year}</span>
                        <button class="month-arrow" onclick="navCalendar(1)">&#8250;</button>
                    </div>
                    <div class="cal-grid-wrap">
                        <div class="cal-weekdays">${WEEKDAYS.map(d=>`<div class="cal-weekday">${d}</div>`).join('')}</div>
                        <div class="cal-grid">${cells}</div>
                    </div>
                    <div class="cal-legend">
                        <div class="legend-item"><div class="legend-swatch completed"></div>Done</div>
                        <div class="legend-item"><div class="legend-swatch skipped"></div>Skipped</div>
                        <div class="legend-item"><div class="legend-swatch rest"></div>Rest</div>
                    </div>
                    ${detailHTML}
                </div>
            </div>`;
        }

        function save() {
            localStorage.setItem('gymCompletedSets', JSON.stringify(completedSets));
        }

        function toggleSet(exIdx, setIdx, rest) {
            const key = `${activeDay}-${exIdx}-${setIdx}`;
            completedSets[key] = !completedSets[key];
            save();
            saveHistoryEntry();
            if (completedSets[key] && rest > 0) startTimer(rest);
            render();
        }

        function resetDay() {
            Object.keys(completedSets).forEach(k => {
                if (k.startsWith(`${activeDay}-`)) delete completedSets[k];
            });
            save();
            stopTimer();
            render();
        }

        function changeDay(idx) { activeDay = idx; render(); }

        function startTimer(secs) {
            stopTimer();
            timeLeft = totalRestTime = secs;
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) { stopTimer(); return; }
                updateTimerDOM();
            }, 1000);
            render();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 0;
        }

        function updateTimerDOM() {
            const digits = document.getElementById('timer-digits');
            if (digits) {
                const m = Math.floor(timeLeft / 60);
                const s = String(timeLeft % 60).padStart(2, '0');
                digits.textContent = `${m}:${s}`;
            }
            const ring = document.getElementById('timer-ring');
            if (ring && totalRestTime > 0) {
                ring.style.strokeDashoffset = 138 - (138 * timeLeft / totalRestTime);
            }
        }

        /* ── Render ── */
        function render() {
            const w = workoutData[activeDay];
            const gradClass = GRAD[w.color] || 'g-slate';
            const totalSets = w.exercises.reduce((a, ex) => a + ex.sets, 0);
            const doneSets = Object.keys(completedSets).filter(k => k.startsWith(`${activeDay}-`) && completedSets[k]).length;
            const pct = totalSets === 0 ? 100 : Math.round(doneSets / totalSets * 100);

            /* Timer */
            let timerHTML = '';
            if (timeLeft > 0) {
                const m = Math.floor(timeLeft / 60);
                const s = String(timeLeft % 60).padStart(2, '0');
                const offset = 138 - (138 * timeLeft / totalRestTime);
                timerHTML = `
                <div class="timer-card">
                    <div class="timer-left">
                        <div class="timer-circle-wrap">
                            <svg class="timer-svg" viewBox="0 0 48 48">
                                <circle cx="24" cy="24" r="22" stroke="#1e293b" stroke-width="3" fill="none"/>
                                <circle id="timer-ring" cx="24" cy="24" r="22" stroke="#3b82f6" stroke-width="3" fill="none"
                                    stroke-dasharray="138" stroke-dashoffset="${offset}"
                                    style="transition:stroke-dashoffset 1s linear;"/>
                            </svg>
                            <span class="timer-clock-icon pulse">${IC.clock}</span>
                        </div>
                        <div>
                            <p class="timer-phase">Recovery Phase</p>
                            <p class="timer-digits" id="timer-digits">${m}:${s}</p>
                        </div>
                    </div>
                    <button class="timer-skip" onclick="stopTimer();render()">Skip</button>
                </div>`;
            }

            /* Exercises */
            const exercisesHTML = w.exercises.map((ex, exIdx) => {
                const allDone = ex.sets > 0 && [...Array(ex.sets)].every((_, i) => completedSets[`${activeDay}-${exIdx}-${i}`]);
                const tags = ex.tags.map(t => `<span class="tag">${t}</span>`).join('');
                const sets = [...Array(ex.sets)].map((_, si) => {
                    const done = completedSets[`${activeDay}-${exIdx}-${si}`];
                    return `<button class="set-btn ${done ? 'done' : 'pending'}" onclick="toggleSet(${exIdx},${si},${ex.rest})">
                        ${done ? IC.check : si + 1}
                    </button>`;
                }).join('');

                return `
                <div class="ex-card ${allDone ? 'all-done' : ''}">
                    <div class="card-top">
                        <div class="card-emoji-bg">${ex.emoji}</div>
                        <div class="card-info-row">
                            <div class="card-img-wrap">
                                <img class="card-img" src="https://picsum.photos/seed/${ex.name.replace(/\s/g,'')}/150/150?grayscale" alt="${ex.name}" onerror="this.style.display='none'">
                                <span class="card-emoji-badge">${ex.emoji}</span>
                            </div>
                            <div>
                                <div class="card-name">${ex.name}</div>
                                <div class="tags">${tags}</div>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="stat">
                                <span class="stat-label">Target</span>
                                <span class="stat-val" style="color:#fff">${IC.flame.replace('stroke="currentColor"','stroke="#f97316"')} ${ex.reps}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Volume</span>
                                <span class="stat-val" style="color:#fff">${IC.dumbbell.replace('stroke="currentColor"','stroke="#60a5fa"')} ${ex.sets} Sets</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Rest</span>
                                <span class="stat-val" style="color:#fff">${IC.clockSm.replace('stroke="currentColor"','stroke="#34d399"')} ${ex.rest}s</span>
                            </div>
                        </div>
                        <div class="weight-box">
                            <span class="weight-label">Starting Weight</span>
                            <span class="weight-val">${ex.weight}</span>
                        </div>
                    </div>
                    <div class="sets-area">
                        <div class="sets-row">${sets}</div>
                    </div>
                </div>`;
            }).join('');

            /* Nav */
            const navHTML = workoutData.map((d, i) => {
                const active = i === activeDay;
                const gc = GRAD[d.color] || 'g-slate';
                return `<button class="nav-btn ${active ? 'active' : ''}" onclick="changeDay(${i})">
                    <span class="nav-icon">${d.icon}</span>
                    <span class="nav-label">D${i + 1}</span>
                    ${active ? `<span class="nav-indicator ${gc}"></span>` : ''}
                </button>`;
            }).join('');

            /* Tip */
            const tipType = w.note ? 'orange' : 'blue';
            const tipText = w.note || 'Stay 1-3 reps from failure on big lifts. Focus on control, not ego.';

            const html = `
            <header class="app-header">
                <div class="header-row">
                    <div class="header-left">
                        <div class="day-badge ${gradClass}">${w.icon}</div>
                        <div>
                            <div class="workout-title">${w.title}</div>
                            <div class="workout-focus">${IC.target.replace('stroke="currentColor"','stroke="#60a5fa"')} ${w.focus}</div>
                        </div>
                    </div>
                    <button class="reset-btn" onclick="resetDay()">${IC.reset}</button>
                </div>
                <div class="progress-wrap">
                    <div class="progress-labels">
                        <span>${IC.activity} Progress</span>
                        <span>${doneSets} / ${totalSets} Sets</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill ${gradClass}" style="width:${pct}%"></div>
                    </div>
                </div>
            </header>

            <main>
                ${timerHTML}
                <div class="exercise-list">${exercisesHTML}</div>
                <div class="tip-box ${tipType}">
                    <div class="tip-icon ${tipType}">${IC.info}</div>
                    <p class="tip-text ${tipType}">${tipText}</p>
                </div>
                <button class="profile-btn" onclick="toggleProfileCalendar()">
                    <span class="profile-btn-icon">📊</span> Check Profile
                </button>
            </main>

            <nav class="bottom-nav">${navHTML}</nav>
            ${showProfileCalendar ? renderProfileCalendar() : ''}`;

            const scrollY = window.scrollY;
            document.getElementById('app').innerHTML = html;
            window.scrollTo(0, scrollY);
        }

        window.onload = () => { seedDemoHistory(); render(); };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
    </script>
</body>
</html>
